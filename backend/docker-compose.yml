version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    container_name: submission_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-submission_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-submission_pass}
      POSTGRES_DB: ${POSTGRES_DB:-submission_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-submission_user} -d ${POSTGRES_DB:-submission_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - submission_network

  localstack:
    image: localstack/localstack:3.8
    platform: linux/arm64
    container_name: submission_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3
      - DEBUG=0
      - DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack_init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | python3 -c \"import sys,json; h=json.load(sys.stdin)['services']; sys.exit(0 if h.get('sqs')=='running' and h.get('s3')=='running' else 1)\""]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - submission_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    platform: linux/arm64
    container_name: submission_api
    command: uvicorn src.adapters.inbound.http.app:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - submission_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    platform: linux/arm64
    container_name: submission_worker
    command: python -m worker.main
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - submission_network

volumes:
  postgres_data:
  localstack_data:

networks:
  submission_network:
    driver: bridge